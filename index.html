<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Digital & Jadwal Sholat</title>
    <!-- Favicon dari gambar -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header & Pemilik -->
        <header>
            <h1>Daus Dopo Digital Clock</h1>
            <p class="owner">Created by Daus Dopo</p>
        </header>

        <!-- Display Jam Utama / Countdown -->
        <div class="clock-card">
            <div id="status-label">WAKTU SEKARANG</div>
            <div id="digital-clock">00:00:00</div>
            <div id="date-display">Hari, 00 Bulan 2026</div>
        </div>

        <!-- Jadwal Sholat -->
        <div class="prayer-schedule">
            <h3>Jadwal Sholat Hari Ini</h3>
            <div class="schedule-grid">
                <div class="prayer-time" id="shubuh-card"><span>Subuh</span> <b id="shubuh-time">--:--</b></div>
                <div class="prayer-time" id="dhuhr-card"><span>Dzuhur</span> <b id="dhuhr-time">--:--</b></div>
                <div class="prayer-time" id="asr-card"><span>Ashar</span> <b id="asr-time">--:--</b></div>
                <div class="prayer-time" id="maghrib-card"><span>Maghrib</span> <b id="maghrib-time">--:--</b></div>
                <div class="prayer-time" id="isha-card"><span>Isya</span> <b id="isha-time">--:--</b></div>
            </div>
        </div>
        
        <!-- Tombol Tambah Pengingat -->
<button id="open-modal-btn" class="add-btn">+ Tambah Pengingat</button>

<!-- List Pengingat -->
<div class="reminder-section">
    <h3>Daftar Acara</h3>
    <div id="reminder-list"></div>
</div>

<!-- Modal Pop-up Pengingat -->
<div id="reminder-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Buat Pengingat Baru</h3>
        <input type="text" id="rem-title" placeholder="Nama Acara">
        <input type="date" id="rem-date">
        <input type="time" id="rem-time">
        <select id="rem-repeat">
            <option value="none">Sekali Saja</option>
            <option value="daily">Harian</option>
        </select>
        <textarea id="rem-desc" placeholder="Deskripsi (opsional)"></textarea>
        <div class="modal-actions">
            <button onclick="closeModal()">Batal</button>
            <button onclick="saveReminder()" style="background:#ff007f;">Simpan</button>
        </div>
    </div>
</div>
    </div>

    <!-- Audio untuk Notifikasi (Opsional, arahkan ke file adzan/beep) -->
    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
